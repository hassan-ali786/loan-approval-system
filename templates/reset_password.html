<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanIQ — Reset Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">Loan<span>IQ</span></div>
    <div class="nav-links">
        <button class="theme-btn" id="themeToggle">☀️</button>
    </div>
</nav>

<div class="container" style="max-width:420px;">
    <div class="card">
        <div class="card-header">
            <h1>Reset Password</h1>
            <p>Choose a new password for your account</p>
            <div class="gold-line"></div>
        </div>

        {% if invalid %}
        <div class="error-box">This reset link is invalid or has already been used.</div>
        <p style="text-align:center; margin-top:16px;">
            <a href="/forgot-password" style="color:var(--gold); text-decoration:none; font-weight:600;">Request a new link</a>
        </p>
        {% else %}
            {% if error %}
            <div class="error-box">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" placeholder="Min 6 characters" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirm_password" placeholder="••••••••" required>
                </div>
                <div class="btn-row" style="margin-top:8px;">
                    <button type="submit" class="btn btn-submit" style="width:100%; justify-content:center;">
                        Reset Password
                    </button>
                </div>
            </form>
        {% endif %}
    </div>
</div>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
