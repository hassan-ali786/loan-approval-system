<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanIQ — Reset Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-layout">
    <a href="/welcome" class="auth-brand">
        <div class="auth-logo">LQ</div>
        <span class="auth-name">Loan<span>IQ</span></span>
    </a>

    <div class="auth-card">
        <div class="auth-title">Set new password</div>
        <div class="auth-subtitle">Choose a strong password for your account</div>

        {% if invalid %}
        <div class="alert alert-error">This link is invalid or has already been used.</div>
        <div class="auth-footer"><a href="/forgot-password">Request a new link →</a></div>
        {% else %}
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="POST">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Min 6 characters" required autofocus>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Update Password</button>
        </form>
        {% endif %}
    </div>
</div>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
