<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanIQ — Reset Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="navbar-inner">
    <a href="/welcome" class="nav-logo">Loan<span>IQ</span></a>
    <div class="nav-links">
        <a href="/login">Sign In</a>
        <button class="theme-btn" id="themeToggle">☀️</button>
    </div>
    </div>
</nav>

<div class="container" style="max-width:420px;">
    <div class="card">
        <div class="case-header">
            <div class="case-ref">One-time credential update</div>
            <div class="case-title">Set new password</div>
        </div>

        {% if invalid %}
        <div class="error-box">This reset link is invalid or has already been used.</div>
        <div class="ledger" style="margin-top:20px;">
            <div class="ledger-row" style="justify-content:center; border:none;">
                <a href="/forgot-password" style="color:var(--brass-light); font-size:13px; text-decoration:none;">Request a new link →</a>
            </div>
        </div>
        {% else %}
        {% if error %}<div class="error-box">{{ error }}</div>{% endif %}
        <form method="POST">
            <div class="form-group">
                <label>New password</label>
                <input type="password" name="new_password" placeholder="Min 6 characters" required>
            </div>
            <div class="form-group">
                <label>Confirm new password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-submit" style="width:100%; justify-content:center; margin-top:8px;">
                Update Password
            </button>
        </form>
        {% endif %}
    </div>
</div>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
