<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanIQ — Sign Up</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-layout">
    <a href="/welcome" class="auth-brand">
        <div class="auth-logo">LQ</div>
        <span class="auth-name">Loan<span>IQ</span></span>
    </a>

    <div class="auth-card">
        <div class="auth-title">Create account</div>
        <div class="auth-subtitle">Start checking your loan eligibility</div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="username" placeholder="Hassan Ali" required autofocus>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 6 characters" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in →</a>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
