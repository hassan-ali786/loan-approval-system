<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanIQ — Change Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">Loan<span>IQ</span></div>
    <div class="nav-links">
        {% if current_user.is_admin %}
        <a href="/admin">Admin Panel</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/history">All History</a>
        {% else %}
        <a href="/">Apply</a>
        <a href="/history">History</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/calculator">EMI Calc</a>
        <a href="/compare">Compare</a>
        {% endif %}
        <a href="/change-password">Password</a>
        <a href="/logout">Logout</a>
        <button class="theme-btn" id="themeToggle">☀️</button>
    </div>
</nav>

<div class="container" style="max-width:420px;">
    <div class="card">
        <div class="card-header">
            <h1>Change Password</h1>
            <p>Update your account password</p>
            <div class="gold-line"></div>
        </div>

        {% if success %}
        <div style="background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.3);
                    color:#2ecc71; border-radius:10px; padding:12px 16px; margin-bottom:18px; font-size:13px;">
            {{ success }}
        </div>
        {% endif %}

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Min 6 characters" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>
            <div class="btn-row" style="margin-top:8px;">
                <button type="submit" class="btn btn-submit" style="width:100%; justify-content:center;">
                    Update Password
                </button>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
