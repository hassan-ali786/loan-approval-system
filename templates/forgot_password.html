<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanIQ — Forgot Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-layout">
    <a href="/welcome" class="auth-brand">
        <div class="auth-logo">LQ</div>
        <span class="auth-name">Loan<span>IQ</span></span>
    </a>

    <div class="auth-card">
        <div class="auth-title">Reset password</div>
        <div class="auth-subtitle">Enter your email and we'll send a reset link</div>

        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% else %}
        <form method="POST">
            <div class="form-group">
                <label>Email on file</label>
                <input type="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Link</button>
        </form>
        {% endif %}

        <div class="auth-footer"><a href="/login">← Back to sign in</a></div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
