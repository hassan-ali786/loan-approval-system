<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanIQ — Forgot Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">Loan<span>IQ</span></div>
    <div class="nav-links">
        <button class="theme-btn" id="themeToggle">☀️</button>
    </div>
</nav>

<div class="container" style="max-width:420px;">
    <div class="card">
        <div class="card-header">
            <h1>Forgot Password</h1>
            <p>We'll send you a reset link by email</p>
            <div class="gold-line"></div>
        </div>

        {% if success %}
        <div style="background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.3);
                    color:#2ecc71; border-radius:10px; padding:12px 16px; margin-bottom:18px; font-size:13px;">
            {{ success }}
        </div>
        {% else %}
        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="btn-row" style="margin-top:8px;">
                <button type="submit" class="btn btn-submit" style="width:100%; justify-content:center;">
                    Send Reset Link
                </button>
            </div>
        </form>
        {% endif %}

        <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--muted);">
            <a href="/login" style="color:var(--gold); text-decoration:none; font-weight:600;">Back to Sign In</a>
        </p>
    </div>
</div>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
