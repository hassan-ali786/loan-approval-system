<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanIQ — Forgot Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">Loan<span>IQ</span></div>
    <div class="nav-links">
        <a href="/login">Sign In</a>
        <button class="theme-btn" id="themeToggle">☀️</button>
    </div>
</nav>

<div class="container" style="max-width:420px;">
    <div class="card">
        <div class="case-header">
            <div class="case-ref">Account recovery</div>
            <div class="case-title">Reset password</div>
        </div>

        {% if success %}
        <div class="alert-success">{{ success }}</div>
        {% else %}
        <p style="color:var(--ink-muted); font-size:13px; margin-bottom:20px; line-height:1.6;">
            Enter your registered email — we'll send a one-time reset link.
        </p>
        <form method="POST">
            <div class="form-group">
                <label>Email on file</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-submit" style="width:100%; justify-content:center; margin-top:8px;">
                Send Reset Link
            </button>
        </form>
        {% endif %}

        <div class="ledger" style="margin-top:24px;">
            <div class="ledger-row" style="justify-content:center; border:none;">
                <a href="/login" style="color:var(--brass-light); font-size:13px; text-decoration:none;">← Back to sign in</a>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
